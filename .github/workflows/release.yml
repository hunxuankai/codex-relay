name: 发布 Windows 更新

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: 配置 Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: 配置 Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: 安装前端依赖
        run: npm ci

      - name: 运行完整检查
        run: npm run check

      - name: 构建 Draft Release
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --config src-tauri/tauri.updater.conf.json
          tagName: v__VERSION__
          releaseName: Codex Relay v__VERSION__
          releaseBody: |
            ## 更新内容

            - 将应用版本提升至 `0.1.1`，用于验证首条真实应用内更新链路。
            - 增加 Windows Sandbox 安全准备、升级前快照和升级后数据保留核验脚本。
            - 本次验收目标是从 `v0.1.0` 应用内升级到 `v0.1.1`，并核对签名、NSIS、重启和测试数据保留。

            ## 更新方式

            已手动安装 `v0.1.0` 的用户可在设置页点击“检查更新”，再选择“下载并安装”。首次带 updater 的版本需要手动安装；后续版本才可使用应用内更新。

            ## 注意事项

            本版本未使用 Windows Authenticode，Windows 可能显示“未知发布者”。安装和升级不会删除 Codex 配置、Codex Relay 应用数据、日志或备份。
          releaseDraft: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
